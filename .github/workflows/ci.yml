name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Generate synthetic data
        run: python scripts/generate_data.py

      - name: Run scoring pipeline
        run: python src/pipeline/run_pipeline.py

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --cov=src/pipeline --cov-report=xml --cov-report=term-missing

      - name: Lint with ruff
        run: python -m ruff check src/ tests/ scripts/ --ignore E501

      - name: Type check with mypy
        run: python -m mypy src/pipeline/ --ignore-missing-imports
        continue-on-error: true

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
